<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="grid-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1a1b"/>

  <!-- Left: text -->
  <rect x="80" y="195" width="5" height="210" rx="2.5" fill="#538d4e"/>

  <text x="108" y="278"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="80" font-weight="700" fill="white">Wordsweeper</text>

  <text x="110" y="328"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="26" fill="#9ca3af">Daily word + minesweeper puzzle</text>

  <rect x="110" y="358" width="236" height="38" rx="19" fill="#538d4e"/>
  <text x="228" y="382"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="16" font-weight="600" fill="white" text-anchor="middle">New puzzle every day</text>

  <text x="110" y="440"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="18" fill="#4b5563">wordsweeper.app</text>

  <!-- Right: grid (6×6, cell=62px, gap=3px, step=65px) -->
  <!-- Grid bg: x=715 y=116 w=396 h=396 -->
  <rect x="715" y="116" width="396" height="396" rx="10" fill="#787c7e" filter="url(#grid-shadow)"/>

  <!-- Row 0 — all hidden -->
  <rect x="719" y="120" width="62" height="62" rx="4" fill="#a8b4bc"/>
  <rect x="784" y="120" width="62" height="62" rx="4" fill="#a8b4bc"/>
  <rect x="849" y="120" width="62" height="62" rx="4" fill="#a8b4bc"/>
  <rect x="914" y="120" width="62" height="62" rx="4" fill="#a8b4bc"/>
  <rect x="979" y="120" width="62" height="62" rx="4" fill="#a8b4bc"/>
  <rect x="1044" y="120" width="62" height="62" rx="4" fill="#a8b4bc"/>

  <!-- Row 1 — hidden | W | num(1L tl) | empty | flag | hidden -->
  <rect x="719" y="185" width="62" height="62" rx="4" fill="#a8b4bc"/>
  <rect x="784" y="185" width="62" height="62" rx="4" fill="#538d4e"/>
  <text x="815" y="216" font-family="-apple-system, sans-serif" font-size="26" font-weight="700"
        fill="white" text-anchor="middle" dominant-baseline="central">W</text>
  <rect x="849" y="185" width="62" height="62" rx="4" fill="#f4f6f7" stroke="#e5e7eb" stroke-width="1"/>
  <text x="856" y="193" font-family="-apple-system, sans-serif" font-size="18" font-weight="700"
        fill="#2563eb" dominant-baseline="hanging">1</text>
  <rect x="914" y="185" width="62" height="62" rx="4" fill="#dfe8ec"/>
  <rect x="979" y="185" width="62" height="62" rx="4" fill="#c9a227"/>
  <!-- Flag icon -->
  <rect x="1007" y="196" width="3" height="38" rx="1.5" fill="#7c3f00"/>
  <polygon points="1010,197 1030,207 1010,217" fill="#ef4444"/>
  <rect x="1003" y="232" width="11" height="3" rx="1.5" fill="#7c3f00"/>
  <rect x="1044" y="185" width="62" height="62" rx="4" fill="#a8b4bc"/>

  <!-- Row 2 — num(1L tl) | empty | O | empty | hidden | hidden -->
  <rect x="719" y="250" width="62" height="62" rx="4" fill="#f4f6f7" stroke="#e5e7eb" stroke-width="1"/>
  <text x="726" y="258" font-family="-apple-system, sans-serif" font-size="18" font-weight="700"
        fill="#2563eb" dominant-baseline="hanging">1</text>
  <rect x="784" y="250" width="62" height="62" rx="4" fill="#dfe8ec"/>
  <rect x="849" y="250" width="62" height="62" rx="4" fill="#538d4e"/>
  <text x="880" y="281" font-family="-apple-system, sans-serif" font-size="26" font-weight="700"
        fill="white" text-anchor="middle" dominant-baseline="central">O</text>
  <rect x="914" y="250" width="62" height="62" rx="4" fill="#dfe8ec"/>
  <rect x="979" y="250" width="62" height="62" rx="4" fill="#a8b4bc"/>
  <rect x="1044" y="250" width="62" height="62" rx="4" fill="#a8b4bc"/>

  <!-- Row 3 — hidden | empty | empty | R | num(1L tl + 1B br) | hidden -->
  <rect x="719" y="315" width="62" height="62" rx="4" fill="#a8b4bc"/>
  <rect x="784" y="315" width="62" height="62" rx="4" fill="#dfe8ec"/>
  <rect x="849" y="315" width="62" height="62" rx="4" fill="#dfe8ec"/>
  <rect x="914" y="315" width="62" height="62" rx="4" fill="#538d4e"/>
  <text x="945" y="346" font-family="-apple-system, sans-serif" font-size="26" font-weight="700"
        fill="white" text-anchor="middle" dominant-baseline="central">R</text>
  <rect x="979" y="315" width="62" height="62" rx="4" fill="#f4f6f7" stroke="#e5e7eb" stroke-width="1"/>
  <text x="986" y="323" font-family="-apple-system, sans-serif" font-size="18" font-weight="700"
        fill="#2563eb" dominant-baseline="hanging">1</text>
  <text x="1034" y="369" font-family="-apple-system, sans-serif" font-size="18" font-weight="700"
        fill="#dc2626" text-anchor="end">1</text>
  <rect x="1044" y="315" width="62" height="62" rx="4" fill="#a8b4bc"/>

  <!-- Row 4 — hidden | hidden | empty | empty | D | hidden -->
  <rect x="719" y="380" width="62" height="62" rx="4" fill="#a8b4bc"/>
  <rect x="784" y="380" width="62" height="62" rx="4" fill="#a8b4bc"/>
  <rect x="849" y="380" width="62" height="62" rx="4" fill="#dfe8ec"/>
  <rect x="914" y="380" width="62" height="62" rx="4" fill="#dfe8ec"/>
  <rect x="979" y="380" width="62" height="62" rx="4" fill="#538d4e"/>
  <text x="1010" y="411" font-family="-apple-system, sans-serif" font-size="26" font-weight="700"
        fill="white" text-anchor="middle" dominant-baseline="central">D</text>
  <rect x="1044" y="380" width="62" height="62" rx="4" fill="#a8b4bc"/>

  <!-- Row 5 — hidden | hidden | bomb | num(2B br) | hidden | hidden -->
  <rect x="719" y="445" width="62" height="62" rx="4" fill="#a8b4bc"/>
  <rect x="784" y="445" width="62" height="62" rx="4" fill="#a8b4bc"/>
  <rect x="849" y="445" width="62" height="62" rx="4" fill="#1a1a1b"/>
  <!-- Bomb icon -->
  <circle cx="880" cy="480" r="13" fill="#4b5563"/>
  <ellipse cx="875" cy="474" rx="4" ry="4" fill="rgba(255,255,255,0.18)"/>
  <rect x="878" y="464" width="4" height="7" rx="2" fill="#6b7280"/>
  <circle cx="885" cy="462" r="3" fill="#f59e0b"/>
  <rect x="914" y="445" width="62" height="62" rx="4" fill="#f4f6f7" stroke="#e5e7eb" stroke-width="1"/>
  <text x="969" y="499" font-family="-apple-system, sans-serif" font-size="18" font-weight="700"
        fill="#dc2626" text-anchor="end">2</text>
  <rect x="979" y="445" width="62" height="62" rx="4" fill="#a8b4bc"/>
  <rect x="1044" y="445" width="62" height="62" rx="4" fill="#a8b4bc"/>
</svg>
